<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <h1>Welcome to Rock Paper Scissors Game!</h1>

    <div>
        <button class="option" id="rock">Rock</button>
        <button class="option" id="paper">Paper</button>
        <button class="option" id="scissors">Scissors</button>
    </div>

    <div>
        <div class="resultMessage"></div>
        <div>Human Score: <span class="humanResult">0</span> </div>
        <div>Computer Score: <span class="computerResult">0</span> </div>
    </div>

    <script src="./js/javascript.js">
    </script>
</body>
</html>
